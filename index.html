                                                        </th>

                                                            <div className="flex items-center justify-center">
                                                                ตำหนิ
                                                                {sortConfig.key === 'defect' && (
                                                                    sortConfig.direction === 'asc' ? <ChevronUp size={14} className="ml-1"/> : <ChevronDown size={14} className="ml-1"/>
                                                                )}
                                                            </div>
                                                        </th>
                                                        <th className="px-6 py-4 text-center sortable-header" onClick={() => handleSort('floating')}>
                                                            <div className="flex items-center justify-center">
                                                                โมลูกลอย
                                                                {sortConfig.key === 'floating' && (
                                                                    sortConfig.direction === 'asc' ? <ChevronUp size={14} className="ml-1"/> : <ChevronDown size={14} className="ml-1"/>
                                                                )}
                                                            </div>
                                                        </th>
                                                        <th className="px-6 py-4 text-center bg-slate-700/50 sortable-header" onClick={() => handleSort('total')}>
                                                            <div className="flex items-center justify-center">
                                                                จำนวนทั้งหมด
                                                                {sortConfig.key === 'total' && (
                                                                    sortConfig.direction === 'asc' ? <ChevronUp size={14} className="ml-1"/> : <ChevronDown size={14} className="ml-1"/>
                                                                )}
                                                            </div>
                                                        </th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {filteredAndSortedStock.map((item, index) => (
                                                        <tr key={item.id} className={`hover:bg-slate-50 transition-colors ${item.status === 'critical' ? 'bg-red-50 hover:bg-red-100' : ''} ${item.status === 'warning' ? 'bg-orange-50 hover:bg-orange-100' : ''}`}>
                                                            <td className="px-6 py-4 font-mono text-slate-500">{index + 1}</td>
                                                            <td className="px-6 py-4 font-bold text-slate-700 flex items-center">
                                                                {item.name}
                                                                {item.status === 'critical' && <span className="ml-2 bg-red-100 text-red-600 text-[10px] px-2 py-0.5 rounded-full uppercase font-bold">Sold Out</span>}
                                                                {item.status === 'warning' && <span className="ml-2 bg-orange-100 text-orange-600 text-[10px] px-2 py-0.5 rounded-full uppercase font-bold">Low</span>}
                                                            </td>
                                                            <td className="px-6 py-4 text-center bg-slate-50/50 font-medium">{item.warehouse}</td>
                                                            <td className="px-6 py-4 text-center">{item.mod}</td>
                                                            <td className="px-6 py-4 text-center">{item.defect > 0 ? <span className="text-red-600 font-bold">{item.defect}</span> : item.defect}</td>
                                                            <td className="px-6 py-4 text-center">{item.floating}</td>
                                                            <td className="px-6 py-4 text-center font-bold text-lg bg-slate-50/50">{item.total}</td>
                                                        </tr>
                                                    ))}
                                                    {filteredAndSortedStock.length === 0 && (
                                                        <tr>
                                                            <td colSpan="7" className="px-6 py-12 text-center text-slate-400">
                                                                ไม่พบสินค้าในกลุ่มนี้
                                                            </td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* SALES ANALYSIS VIEW (NEW) */}
                            {activeTab === 'sales' && (
                                <div className="space-y-6">
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                                        <div className="p-6 border-b border-slate-100 flex items-center justify-between bg-gradient-to-r from-blue-50 to-white">
                                            <div>
                                                <h3 className="text-lg font-bold text-slate-800">วิเคราะห์สต็อกและการสั่งซื้อ (Stock Analysis & Purchasing)</h3>
                                                <p className="text-sm text-slate-500 mt-1">Lead Time: 3 Months</p>
                                            </div>
                                            <div className="flex items-center space-x-3">
                                                <select
                                                    className="pl-3 pr-8 py-2 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                                                    value={filterSalesMonth}
                                                    onChange={(e) => setFilterSalesMonth(e.target.value)}
                                                >
                                                    <option value="All">ทั้งหมด (6 เดือน)</option>
                                                    <option value="jan">ม.ค. 69</option>
                                                    <option value="dec">ธ.ค. 68</option>
                                                    <option value="nov">พ.ย. 68</option>
                                                    <option value="oct">ต.ค. 68</option>
                                                    <option value="sep">ก.ย. 68</option>
                                                    <option value="aug">ส.ค. 68</option>
                                                </select>
                                                <div className="relative group w-48 md:w-64">
                                                    <Search className="absolute left-3.5 top-1/2 transform -translate-y-1/2 text-slate-400 group-hover:text-blue-500 transition-colors" size={18} />
                                                    <input 
                                                        type="text" 
                                                        placeholder="ค้นหาสินค้า..." 
                                                        className="pl-11 pr-4 py-2 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 w-full transition-all shadow-sm"
                                                        value={salesSearchQuery}
                                                        onChange={(e) => setSalesSearchQuery(e.target.value)}
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-sm text-left">
                                                <thead className="bg-slate-800 text-white text-xs uppercase font-semibold">
                                                    <tr>
                                                        <th className="px-4 py-4 w-12 text-center">No.</th>
                                                        <th className="px-4 py-4 w-1/4">สินค้า (Item)</th>
                                                        <th className="px-4 py-4 text-center bg-slate-700/50">คงเหลือ (Stock)</th>
                                                        {(filterSalesMonth === 'All' || filterSalesMonth === 'jan') && <th className="px-4 py-4 text-center">ม.ค. 69</th>}
                                                        {(filterSalesMonth === 'All' || filterSalesMonth === 'dec') && <th className="px-4 py-4 text-center">ธ.ค. 68</th>}
                                                        {(filterSalesMonth === 'All' || filterSalesMonth === 'nov') && <th className="px-4 py-4 text-center">พ.ย. 68</th>}
                                                        {(filterSalesMonth === 'All' || filterSalesMonth === 'oct') && <th className="px-4 py-4 text-center">ต.ค. 68</th>}
                                                        {(filterSalesMonth === 'All' || filterSalesMonth === 'sep') && <th className="px-4 py-4 text-center">ก.ย. 68</th>}
                                                        {(filterSalesMonth === 'All' || filterSalesMonth === 'aug') && <th className="px-4 py-4 text-center">ส.ค. 68</th>}
                                                        <th className="px-4 py-4 text-center bg-blue-900/30">เฉลี่ย (Avg/Mo)</th>
                                                        <th className="px-4 py-4 text-center">สต็อกอยู่ได้ (Stock Duration)</th>
                                                        <th className="px-4 py-4 text-center bg-slate-700/50">สถานะสั่งซื้อ (Lead Time: 3 Mo)</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {filteredSales.map((item, index) => {
                                                        const totalSales = item.sales.jan + item.sales.dec + item.sales.nov + item.sales.oct + item.sales.sep + item.sales.aug;
                                                        const avgSales = totalSales > 0 ? (totalSales / 6) : 0;
                                                        const stockDuration = avgSales > 0 ? (item.total / avgSales) : (item.total > 0 ? 999 : 0); 
                                                        const leadTimeRatio = stockDuration / 3;

                                                        let statusBadge;
                                                        if (item.total === 0) {
                                                            statusBadge = <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold border border-red-200 flex items-center justify-center w-fit mx-auto"><AlertCircle size={12} className="mr-1"/> Out of Stock</span>;
                                                        } else if (leadTimeRatio < 1) {
                                                            statusBadge = <span className="bg-red-50 text-red-600 px-3 py-1 rounded-full text-xs font-bold border border-red-100 flex items-center justify-center w-fit mx-auto animate-pulse">Order Now (Ratio: {leadTimeRatio.toFixed(2)})</span>;
                                                        } else if (leadTimeRatio < 1.5) {
                                                            statusBadge = <span className="bg-orange-50 text-orange-600 px-3 py-1 rounded-full text-xs font-bold border border-orange-100 flex items-center justify-center w-fit mx-auto">Warning (Ratio: {leadTimeRatio.toFixed(2)})</span>;
                                                        } else {
                                                            statusBadge = <span className="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-xs font-bold border border-emerald-100 flex items-center justify-center w-fit mx-auto">Safe (Ratio: {leadTimeRatio.toFixed(2)})</span>;
                                                        }
                                                        
                                                        return (
                                                            <tr key={item.id} className="hover:bg-slate-50 transition-colors">
                                                                <td className="px-4 py-4 text-center font-mono text-slate-500">{index + 1}</td>
                                                                <td className="px-4 py-4 font-bold text-slate-700">{item.name}</td>
                                                                <td className="px-4 py-4 text-center bg-slate-50/50 font-bold text-slate-800">{item.total}</td>
                                                                
                                                                {(filterSalesMonth === 'All' || filterSalesMonth === 'jan') && <td className="px-4 py-4 text-center text-slate-600">{item.sales.jan}</td>}
                                                                {(filterSalesMonth === 'All' || filterSalesMonth === 'dec') && <td className="px-4 py-4 text-center text-slate-600">{item.sales.dec}</td>}
                                                                {(filterSalesMonth === 'All' || filterSalesMonth === 'nov') && <td className="px-4 py-4 text-center text-slate-600">{item.sales.nov}</td>}
                                                                {(filterSalesMonth === 'All' || filterSalesMonth === 'oct') && <td className="px-4 py-4 text-center text-slate-600">{item.sales.oct}</td>}
                                                                {(filterSalesMonth === 'All' || filterSalesMonth === 'sep') && <td className="px-4 py-4 text-center text-slate-600">{item.sales.sep}</td>}
                                                                {(filterSalesMonth === 'All' || filterSalesMonth === 'aug') && <td className="px-4 py-4 text-center text-slate-600">{item.sales.aug}</td>}

                                                                <td className="px-4 py-4 text-center font-bold text-blue-600 bg-blue-50/30">{avgSales > 0 ? avgSales.toFixed(2) : '-'}</td>
                                                                <td className="px-4 py-4 text-center font-medium">
                                                                    {stockDuration === 999 ? <span className="text-slate-400">N/A</span> : 
                                                                     stockDuration === 0 ? <span className="text-red-500">0.00 เดือน</span> :
                                                                     <span>{stockDuration.toFixed(2)} เดือน</span>}
                                                                </td>
                                                                <td className="px-4 py-4 text-center">
                                                                    {statusBadge}
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                    {filteredSales.length === 0 && (
                                                        <tr>
                                                            <td colSpan="12" className="px-6 py-12 text-center text-slate-400">
                                                                ไม่พบสินค้าในรายการขาย
                                                            </td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* OTHER VIEWS */}
                            {(activeTab === 'approve' || activeTab === 'settings') && (
                                <div className="flex flex-col items-center justify-center py-20 bg-white rounded-2xl shadow-sm border border-slate-100">
                                    <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4 text-slate-400">
                                        <Settings size={32} />
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-700">กำลังพัฒนา (Coming Soon)</h3>
                                    <p className="text-slate-500 mt-2">ฟีเจอร์นี้จะเปิดให้ใช้งานเร็วๆ นี้ครับ</p>
                                </div>
                            )}

                        </div>
                    </div>

                    {/* AI Report Modal */}
                    {showAiModal && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 p-4 backdrop-blur-sm transition-opacity">
                        <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden animate-in fade-in zoom-in duration-200 border border-slate-100">
                        <div className="p-5 border-b border-slate-100 flex items-center justify-between bg-gradient-to-r from-indigo-50/50 to-white">
                            <div className="flex items-center space-x-3 text-indigo-900">
                            <div className="bg-indigo-100 p-2 rounded-lg">
                                    <Sparkles className="text-indigo-600" size={20} />
                            </div>
                            <div>
                                <h3 className="font-bold text-lg leading-none">AI Daily Report</h3>
                                <p className="text-xs text-indigo-500/80 mt-1">Generated by Gemini 2.0</p>
                            </div>
                            </div>
                            <button onClick={() => setShowAiModal(false)} className="text-slate-400 hover:text-slate-600 bg-white hover:bg-slate-100 p-2 rounded-full transition-colors">
                            <X size={20} />
                            </button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-8 bg-slate-50/50">
                            {isGenerating ? (
                            <div className="flex flex-col items-center justify-center h-64 space-y-6">
                                <div className="relative">
                                    <div className="absolute inset-0 bg-indigo-500 rounded-full blur-xl opacity-20 animate-pulse"></div>
                                    <Loader2 className="animate-spin text-indigo-600 relative z-10" size={48} />
                                </div>
                                <div className="text-center space-y-1">
                                    <p className="text-slate-800 font-medium text-lg">Gemini กำลังวิเคราะห์ข้อมูล...</p>
                                    <p className="text-slate-500 text-sm">กำลังสรุปยอดงาน งานค้าง และคำแนะนำสำหรับทีม</p>
                                </div>
                            </div>
                            ) : (
                            <div className="prose prose-indigo max-w-none">
                                <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 whitespace-pre-wrap leading-relaxed text-slate-700 font-medium">
                                {aiReport}
                                </div>
                            </div>
                            )}
                        </div>

                        {!isGenerating && aiReport && (
                            <div className="p-5 border-t border-slate-100 bg-white flex justify-end space-x-3">
                                <button 
                                onClick={() => {
                                    navigator.clipboard.writeText(aiReport);
                                    alert("คัดลอกรายงานแล้ว!");
                                }}
                                className="flex items-center space-x-2 px-5 py-2.5 text-slate-600 hover:bg-slate-50 border border-slate-200 rounded-xl transition-all font-medium"
                                >
                                <Copy size={18} />
                                <span>คัดลอกข้อความ</span>
                                </button>
                                <button 
                                onClick={() => setShowAiModal(false)}
                                className="bg-indigo-600 text-white px-6 py-2.5 rounded-xl hover:bg-indigo-700 font-medium shadow-md shadow-indigo-200 hover:shadow-lg hover:shadow-indigo-200 transition-all"
                                >
                                ปิดหน้าต่าง
                                </button>
                            </div>
                        )}
                        </div>
                    </div>
                    )}

                </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
