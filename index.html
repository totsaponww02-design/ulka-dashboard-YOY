            const [lowStockOnly, setLowStockOnly] = useState(false);
            const [threshold, setThreshold] = useState(40);
            const [sortDirection, setSortDirection] = useState(null); // null, 'asc', 'desc'
            const [sortBy, setSortBy] = useState('total');

            // --- Helper: Color Code Logic (Updated based on image thresholds) ---
            const getColorCode = (value) => {
                if (!isFinite(value)) return 'bg-slate-100 text-slate-400';
                
                // ต่ำกว่า 0.75 = สีแดง (ต้องสั่งเพิ่ม)
                if (value < 0.75) return 'bg-red-500 text-white';
                
                // 0.75 ถึง 1.24 = สีเหลือง (เฝ้าระวัง)
                if (value < 1.25) return 'bg-yellow-400 text-black';
                
                // 1.25 ขึ้นไป = สีเขียว (ปกติ)
                return 'bg-green-500 text-white';
            };

            // Sort Handler
            const handleSort = (key) => {
                if (sortBy === key) {
                    setSortDirection(current => {
                        if (current === null) return 'asc';
                        if (current === 'asc') return 'desc';
                        return null;
                    });
                } else {
                    setSortBy(key);
                    setSortDirection('desc');
                }
            };

            // Data Processing

                let data = INITIAL_DATA.map(item => {
                    const total = item.warehouse + item.ready + item.defect + item.floating;
                    const avgMonthly = item.usage6m / 6;
                    
                    // Calculation Normal: Aging = Total / Average
                    const aging = avgMonthly > 0 ? total / avgMonthly : Infinity;
                    const code = item.leadTime > 0 ? aging / item.leadTime : 0;

                    // Calculation +50%: 
                    const avgMonthly50 = avgMonthly * 1.5;
                    const aging50 = avgMonthly50 > 0 ? total / avgMonthly50 : Infinity;
                    const code50 = item.leadTime > 0 ? aging50 / item.leadTime : 0;

                    return {
                        ...item,
                        total,
                        avgMonthly,
                        aging,
                        code,
                        avgMonthly50,
                        aging50,
                        code50
                    };
                }).filter(item => {
                    const matchesSearch = item.model.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesLowStock = lowStockOnly ? item.total < threshold : true;
                    return matchesSearch && matchesLowStock;
                });

                if (sortDirection) {
                    data.sort((a, b) => {
                        let valA = a[sortBy];
                        let valB = b[sortBy];
                        
                        // Handle infinite values in sorting
                        if (!isFinite(valA)) valA = -1; 
                        if (!isFinite(valB)) valB = -1;

                        if (sortDirection === 'asc') return valA - valB;
                        return valB - valA;
                    });
                }
                return data;
            }, [searchTerm, lowStockOnly, threshold, sortDirection, sortBy]);

            const stats = useMemo(() => {
                const totalItems = processedData.length;
                const lowStockCount = processedData.filter(item => item.total < threshold).length;
                return { totalItems, lowStockCount };
            }, [processedData, threshold]);

                            </div>

                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-all ${

                                </button>

                                            </th>
                                            
                                            {/* New Mid-Month Column */}
                                            <th 
                                                className="p-3 text-center font-bold bg-indigo-700 text-white w-24 border-r border-slate-700 cursor-pointer hover:bg-indigo-600"

                                                    ยอดกลางเดือน

                                                </div>
                                            </th>
                                            <th className="p-3 text-center font-bold bg-yellow-700 text-white w-20 border-r border-slate-600" title="ระยะเวลาซื้อ (เดือน)">Lead Time</th>
                                            
                                            {/* Normal Scenario Headers */}
                                            <th className="p-3 text-center font-bold bg-teal-700 w-24 border-r border-teal-600">เฉลี่ย/ด</th>
                                            <th className="p-3 text-center font-bold bg-amber-700 text-white w-24 border-r border-amber-600" title="สต็อกจะอยู่ได้ (เดือน)">สต็อก(ด.)</th>
                                            <th 
                                                className="p-3 text-center font-bold bg-emerald-700 text-white w-24 cursor-pointer hover:bg-emerald-600 border-r border-slate-600" 
                                                title="รหัส (Code)"
                                                onClick={() => handleSort('code')}
                                            >
                                                <div className="flex items-center justify-center gap-1">
                                                    รหัส
                                                    {sortBy === 'code' && <ArrowDown className="w-3 h-3 text-white" />}
                                                </div>
                                            </th>

                                            {/* +50% Scenario Headers */}
                                            <th className="p-3 text-center font-bold bg-purple-800 w-24 border-r border-purple-700">เฉลี่ย(+50%)</th>
                                            <th className="p-3 text-center font-bold bg-fuchsia-800 text-white w-24 border-r border-fuchsia-700" title="สต็อกจะอยู่ได้ถ้าใช้เพิ่ม 50%">สต็อก(+50%)</th>
                                            <th 
                                                className="p-3 text-center font-bold bg-pink-700 text-white w-24 cursor-pointer hover:bg-pink-600" 
                                                title="รหัสเมื่อยอดใช้เพิ่ม 50%"
                                                onClick={() => handleSort('code50')}
                                            >
                                                <div className="flex items-center justify-center gap-1">
                                                    รหัส(+50%)
                                                    {sortBy === 'code50' && <ArrowDown className="w-3 h-3 text-white" />}
                                                </div>
                                            </th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-200 bg-white">
                                        {processedData.length > 0 ? (
                                            processedData.map((item, index) => {
                                                const isLowStock = item.total < threshold;
                                                const isOutOfStock = item.total === 0;

                                                return (
                                                    <tr 
                                                        key={item.id} 
                                                        className={`hover:bg-blue-50 transition-colors ${
                                                            isOutOfStock ? 'bg-red-50' : isLowStock ? 'bg-orange-50' : ''
                                                        }`}
                                                    >
                                                        <td className="p-3 text-center text-slate-500 font-eng sticky left-0 bg-white z-10 border-r border-slate-100">{item.id}</td>
                                                        <td className="p-3 font-medium text-slate-800 sticky left-12 bg-white z-10 border-r border-slate-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">
                                                            <div className="flex items-center gap-2">
                                                                {item.model}
                                                                {isOutOfStock && <span className="text-[9px] bg-red-600 text-white px-1.5 py-0.5 rounded shadow-sm">หมด</span>}
                                                            </div>
                                                        </td>
                                                        <td className="p-3 text-center text-slate-600 font-eng tabular-nums border-r border-slate-100">{item.warehouse}</td>
                                                        <td className="p-3 text-center text-slate-600 font-eng tabular-nums border-r border-slate-100">{item.ready}</td>
                                                        <td className="p-3 text-center text-slate-600 font-eng tabular-nums border-r border-slate-100">{item.defect}</td>
                                                        <td className="p-3 text-center text-slate-600 font-eng tabular-nums border-r border-slate-100">{item.floating}</td>
                                                        <td className="p-3 text-center font-bold text-base border-r border-slate-200 font-eng tabular-nums bg-slate-50">
                                                             <span className={isLowStock ? 'text-red-600' : 'text-slate-800'}>{item.total}</span>
                                                        </td>
                                                        
                                                        {/* New Mid-Month Column */}
                                                        <td className="p-3 text-center font-semibold text-indigo-700 font-eng tabular-nums border-r border-slate-200 bg-indigo-50/30">
                                                            {item.midMonth}
                                                        </td>

                                                        <td className="p-3 text-center text-teal-700 bg-teal-50/30 font-medium font-eng tabular-nums border-r border-slate-100">{item.usage6m}</td>
                                                        <td className="p-3 text-center bg-yellow-50/30 font-bold text-slate-700 border-r border-slate-200 font-eng tabular-nums">
                                                            {item.leadTime}
                                                        </td>
                                                        
                                                        {/* Normal Scenario Data */}
                                                        <td className="p-3 text-center text-teal-800 bg-teal-100/20 font-medium font-eng tabular-nums border-r border-slate-100">
                                                            {item.avgMonthly > 0 ? item.avgMonthly.toFixed(1) : '-'}
                                                        </td>
                                                        <td className="p-3 text-center bg-amber-50/20 font-eng tabular-nums text-slate-700 border-r border-slate-100">
                                                            {isFinite(item.aging) ? item.aging.toFixed(1) : '-'}
                                                        </td>
                                                        <td className="p-1 text-center align-middle border-r border-slate-200">
                                                            <div className={`mx-auto py-1 px-2 rounded font-bold text-xs w-16 font-eng shadow-sm ${getColorCode(item.code)}`}>
                                                                {isFinite(item.code) ? item.code.toFixed(2) : '-'}
                                                            </div>
                                                        </td>

                                                        {/* +50% Scenario Data */}
                                                        <td className="p-3 text-center text-purple-800 bg-purple-100/20 font-medium font-eng tabular-nums border-r border-slate-100">
                                                            {item.avgMonthly50 > 0 ? item.avgMonthly50.toFixed(1) : '-'}
                                                        </td>
                                                        <td className="p-3 text-center bg-fuchsia-50/20 font-eng tabular-nums text-slate-700 border-r border-slate-100">
                                                            {isFinite(item.aging50) ? item.aging50.toFixed(1) : '-'}
                                                        </td>
                                                        <td className="p-1 text-center align-middle">
                                                            <div className={`mx-auto py-1 px-2 rounded font-bold text-xs w-16 font-eng shadow-sm ${getColorCode(item.code50)}`}>
                                                                {isFinite(item.code50) ? item.code50.toFixed(2) : '-'}
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })
                                        ) : (
                                            <tr>
                                                <td colSpan="16" className="p-12 text-center text-slate-400">
                                                    <div className="flex flex-col items-center gap-2">
                                                        <Filter className="w-8 h-8 opacity-50" />
                                                        <p>ไม่พบข้อมูลที่ตรงกับเงื่อนไข</p>
                                                    </div>
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
